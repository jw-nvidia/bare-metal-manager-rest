apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "carbide-rest-workflow.name" . }}-config
  namespace: {{ include "carbide-rest-workflow.namespace" . }}
  labels:
    {{- include "carbide-rest-workflow.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- if .Values.secrets.dbCreds }}
    {{- $config := deepCopy .Values.config -}}
    {{- $_ := set $config.db "passwordPath" "/var/secrets/db/password" -}}
    {{- $_ := unset $config.db "password" -}}
    {{- $config | toYaml | nindent 4 }}
    {{- else }}
    {{- .Values.config | toYaml | nindent 4 }}
    {{- end }}
